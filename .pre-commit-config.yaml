---
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --
        types: [rust]
      - id: cargo-check
        name: cargo check
        language: system
        entry: cargo check --tests --workspace --quiet --features derive,serde,std,si-units,iec-units
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --tests --workspace --quiet --features derive,serde,std,si-units,iec-units
          -- -D warnings
        types: [rust]
        pass_filenames: false
      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck --external-sources
        types: [shell]
      - id: shfmt
        name: shfmt
        language: system
        entry: shfmt --indent 4 --diff --write
        types: [shell]
  - repo: https://github.com/lyz-code/yamlfix
    rev: 1.17.0
    hooks:
      - id: yamlfix
